<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beginner Gains Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .tabs {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #ddd;
            cursor: pointer;
            font-size: 16px;
        }
        button.active {
            background-color: #3498db;
            color: white;
        }
        .workout-list {
            display: none;
        }
        .workout-list.active {
            display: block;
        }
        .exercise {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .exercise input {
            margin-right: 15px;
            width: 20px;
            height: 20px;
        }
        .diet-reminder {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-left: 4px solid #1abc9c;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Gains Tracker 🏋️‍♂️</h1>
    
    <div class="tabs">
        <button id="btnA" class="active" onclick="showWorkout('A')">Workout A</button>
        <button id="btnB" onclick="showWorkout('B')">Workout B</button>
    </div>

    <div id="workoutA" class="workout-list active">
        <h3>Full Body - Day A</h3>
        <label class="exercise"><input type="checkbox"> Goblet Squats (3x 8-10)</label>
        <label class="exercise"><input type="checkbox"> Machine Chest Press (3x 8-10)</label>
        <label class="exercise"><input type="checkbox"> Seated Cable Rows (3x 10-12)</label>
        <label class="exercise"><input type="checkbox"> Dumbbell Lateral Raises (3x 12-15)</label>
        <label class="exercise"><input type="checkbox"> Plank (3x 30-45 sec)</label>
    </div>

    <div id="workoutB" class="workout-list">
        <h3>Full Body - Day B</h3>
        <label class="exercise"><input type="checkbox"> Leg Press (3x 10-12)</label>
        <label class="exercise"><input type="checkbox"> Lat Pulldowns (3x 10-12)</label>
        <label class="exercise"><input type="checkbox"> Dumbbell Overhead Press (3x 8-10)</label>
        <label class="exercise"><input type="checkbox"> Dumbbell Bicep Curls (3x 10-12)</label>
        <label class="exercise"><input type="checkbox"> Tricep Rope Pushdowns (3x 10-12)</label>
    </div>

    <div class="diet-reminder">
        <strong>Daily Hosteller Checklist:</strong>
        <ul style="margin: 5px 0 0 0; padding-left: 20px;">
            <li>Take 3-5g Creatine 💧</li>
            <li>Eat calorie-dense snacks (Peanut Butter, Chana) 🥜</li>
            <li>Hit protein goals (Mess food + Whey/Soya) 🍗</li>
        </ul>
    </div>
</div>

<script>
    function showWorkout(day) {
        // Reset buttons
        document.getElementById('btnA').classList.remove('active');
        document.getElementById('btnB').classList.remove('active');
        
        // Hide both workouts
        document.getElementById('workoutA').classList.remove('active');
        document.getElementById('workoutB').classList.remove('active');
        
        // Show selected
        document.getElementById('btn' + day).classList.add('active');
        document.getElementById('workout' + day).classList.add('active');
    }
</script>

</body>
</html>
